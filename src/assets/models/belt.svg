<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">

  <!-- BELT STRAP -->
  <g class="belt">

    <!-- NARROW -->
    <rect class="belt-narrow" x="20" y="55" width="140" height="10"
      fill="var(--belt-color, #5A3E2B)" />

    <!-- MEDIUM -->
    <rect class="belt-medium" x="20" y="50" width="140" height="20"
      fill="var(--belt-color, #5A3E2B)" visibility="hidden"/>

    <!-- WIDE -->
    <rect class="belt-wide" x="20" y="45" width="140" height="30"
      fill="var(--belt-color, #5A3E2B)" visibility="hidden"/>

  </g>

  <!-- BUCKLES -->
  <g class="buckles" stroke="#C0C0C0" fill="none" stroke-width="3">

    <!-- FRAME BUCKLE -->
    <rect class="buckle-frame" x="85" y="50" width="15" height="20"/>

    <!-- BOX BUCKLE -->
    <rect class="buckle-box" x="83" y="48" width="20" height="24"
      fill="#C0C0C0" visibility="hidden"/>

    <!-- RING BUCKLE -->
    <circle class="buckle-ring" cx="92" cy="60" r="10"
      visibility="hidden"/>

    <!-- ROUND PLATE -->
    <g>
      <circle visibility="hidden" class="buckle-plate" cx="92" cy="60" r="12" fill="#C0C0C0"/>
      <circle visibility="hidden" class="buckle-plate no-edit" cx="92" cy="60" r="5" fill="none" stroke="#888"/>
    </g>

  </g>

</svg>